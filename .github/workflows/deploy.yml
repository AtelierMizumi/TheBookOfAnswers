name: Flutter Web & APK Deploy

# Trigger on pushes to the main branch
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

# Manage permissions for GitHub Pages deployment
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17' # Required for Android build

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # ==========================================
      # 1. BUILD WEB
      # ==========================================
      - name: Build Web
        run: flutter build web --release --base-href /

      # ==========================================
      # 2. DEPLOY WEB TO GITHUB PAGES
      # ==========================================
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          
      # ==========================================
      # 3. BUILD ANDROID APK
      # ==========================================
      - name: Build APK
        run: flutter build apk --release

      # ==========================================
      # 4. UPLOAD APK AS ARTIFACT
      # ==========================================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZenFlip-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # ==========================================
      # 5. CREATE GITHUB RELEASE
      # ==========================================
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "The Book of Answers v1.0.${{ github.run_number }}"
          body: |
            ## 🔮 The Book of Answers — Automated Release

            Built automatically from the `main` branch.
            
            ### 📱 Installation
            Download `app-release.apk` below and install on any Android device.

            ### 🌐 Web Version
            Visit the live web version on GitHub Pages.
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
